<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - FoodieApp</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo">Foodie<span>App</span></a>
        </div>
    </header>

    <main class="auth-wrapper">
        <div class="auth-card">
            <h2>Chào mừng trở lại! 👋</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px; font-size: 15px;">Vui lòng đăng nhập để tiếp tục</p>

            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="identifier">Email hoặc Tên đăng nhập</label>
                    <input type="text" id="identifier" placeholder="Nhập email hoặc username..." required>
                </div>

                <div class="input-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div style="text-align: right; margin-bottom: 20px;">
                    <a href="#" class="forgot-password">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="btn-primary" style="padding: 14px; font-size: 16px;">
                    Đăng Nhập
                </button>
            </form>

            <div class="auth-links">
                Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
            </div>
        </div>
    </main>

    <script src="auth.js"></script>
</body>
</html>
