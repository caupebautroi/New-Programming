<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - FoodieApp</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo">Foodie<span>App</span></a>
        </div>
    </header>

    <main class="auth-wrapper">
        <div class="auth-card">
            <h2>Tạo tài khoản mới 🚀</h2>
            <p style="color: var(--text-muted); margin-bottom: 25px; font-size: 15px;">Điền thông tin của bạn bên dưới</p>

            <form onsubmit="handleRegister(event)">
                <div class="input-group">
                    <label for="username">Tên đăng nhập (Username)</label>
                    <input type="text" id="username" placeholder="Nhập tên viết liền không dấu..." required>
                </div>

                <div class="input-group">
                    <label for="email">Địa chỉ Email</label>
                    <input type="email" id="email" placeholder="ví dụ: abc@gmail.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="Tối thiểu 6 ký tự..." required>
                </div>

                <div class="input-group">
                    <label for="confirmPassword">Xác nhận mật khẩu</label>
                    <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu..." required>
                </div>

                <button type="submit" class="btn-primary" style="padding: 14px; font-size: 16px; margin-top: 10px;">
                    Đăng Ký
                </button>
            </form>

            <div class="auth-links">
                Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
            </div>
        </div>
    </main>

    <script src="auth.js"></script>
</body>
</html>
